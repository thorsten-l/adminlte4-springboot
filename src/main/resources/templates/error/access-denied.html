<!doctype html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<body>
<h3 layout:fragment="page-title">Zugriff verweigert</h3>
<section layout:fragment="content">
    <div class="error-page">
        <h2 class="headline text-warning">403</h2>
        <div class="error-content">
            <h3><i class="bi bi-exclamation-triangle text-warning"></i> Kein Zugriff.</h3>
            <p>Du bist eingeloggt, hast aber nicht die nötigen Rechte für diese Seite.</p>
            <p><a th:href="@{/}">Zurück zur Startseite</a></p>
        </div>
    </div>
</section>
</body>
</html>
