services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: adminlte-demo-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: "8180"
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\nhost: localhost:9000\\n' >&3; cat <&3 | grep -m1 status | grep -m1 UP; ERROR=$?; exec 3<&-; exec 3>&-; exit $ERROR"]
      interval: 10s
      timeout: 5s
      retries: 10
